<!-- Inline shared engine (from rules/engine.js) -->
<script>
// AI Slop Detector — Shared matching engine
// Isomorphic: works in browser, Node.js, VS Code, and Office Add-ins.
// No DOM or platform-specific APIs — text in, data out.

var CUSTOM_HANDLERS = {
  doubleEmdash: function(text) {
    var hits = [];
    var sentences = text.split(/(?<=[.!?])\s+/);
    var offset = 0;
    for (var si = 0; si < sentences.length; si++) {
      var s = sentences[si];
      var dashes = [];
      var dashRe = /[\u2013\u2014]/g;
      var dm;
      while ((dm = dashRe.exec(s)) !== null) {
        dashes.push(dm);
      }
      if (dashes.length >= 2) {
        hits.push({ start: offset, end: offset + s.length });
      }
      var gap = text.slice(offset + s.length).match(/^\s+/);
      offset += s.length + (gap ? gap[0].length : 0);
    }
    return hits;
  }
};

function loadRules(rulesJson) {
  return rulesJson.map(function(r) {
    var compiled = {};
    for (var k in r) { if (r.hasOwnProperty(k)) compiled[k] = r[k]; }
    if (r.pattern) {
      compiled.regex = new RegExp(r.pattern, r.flags || "g");
    }
    if (r.customHandler && CUSTOM_HANDLERS[r.customHandler]) {
      compiled.testFn = CUSTOM_HANDLERS[r.customHandler];
    }
    return compiled;
  });
}

function getMatches(text, rule) {
  if (rule.testFn) return rule.testFn(text);
  if (!rule.regex) return [];
  var hits = [];
  rule.regex.lastIndex = 0;
  var m;
  while ((m = rule.regex.exec(text)) !== null) {
    hits.push({ start: m.index, end: m.index + m[0].length });
  }
  return hits;
}

function scan(text, rules) {
  var results = [];
  for (var i = 0; i < rules.length; i++) {
    var rule = rules[i];
    var hits = getMatches(text, rule);
    for (var j = 0; j < hits.length; j++) {
      var hit = hits[j];
      results.push({
        ruleId: rule.id,
        ruleName: rule.name,
        description: rule.description,
        severity: rule.severity,
        start: hit.start,
        end: hit.end,
        matchText: text.slice(hit.start, hit.end)
      });
    }
  }
  return results;
}

function summarize(matches) {
  var summary = {};
  for (var i = 0; i < matches.length; i++) {
    var r = matches[i];
    if (!summary[r.ruleId]) {
      summary[r.ruleId] = { id: r.ruleId, name: r.ruleName, description: r.description, severity: r.severity, count: 0, examples: [] };
    }
    summary[r.ruleId].count++;
    if (summary[r.ruleId].examples.length < 3) {
      summary[r.ruleId].examples.push(r.matchText);
    }
  }
  var rulesList = [];
  for (var key in summary) { if (summary.hasOwnProperty(key)) rulesList.push(summary[key]); }
  return {
    total: matches.length,
    high: matches.filter(function(r) { return r.severity === "high"; }).length,
    medium: matches.filter(function(r) { return r.severity === "medium"; }).length,
    low: matches.filter(function(r) { return r.severity === "low"; }).length,
    rules: rulesList
  };
}

if (typeof globalThis !== "undefined") {
  globalThis.SlopEngine = { loadRules: loadRules, scan: scan, summarize: summarize, getMatches: getMatches };
}
</script>
